<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Part Scanner — Menu</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow:wght@400;600;700;800&display=swap');
        :root{
            --bg:#0d1117;--card:#161b22;--border:#30363d;
            --accent:#00e5a0;--blue:#58a6ff;--warn:#f0b429;
            --purple:#bf97ff;--danger:#f85149;--text:#c9d1d9;--muted:#8b949e;
            --mono:'Share Tech Mono',monospace;--sans:'Barlow',sans-serif;
        }
        *{box-sizing:border-box;margin:0;padding:0;}
        body{font-family:var(--sans);background:var(--bg);color:var(--text);
            min-height:100vh;display:flex;flex-direction:column;
            align-items:center;justify-content:center;padding:24px;}

        .logo{text-align:center;margin-bottom:40px;}
        .logo-dot{width:14px;height:14px;border-radius:50%;background:var(--accent);
            box-shadow:0 0 18px var(--accent);margin:0 auto 14px;
            animation:pulse 2s infinite;}
        @keyframes pulse{0%,100%{box-shadow:0 0 10px var(--accent)}50%{box-shadow:0 0 24px var(--accent)}}
        .logo h1{font-family:var(--mono);font-size:20px;color:var(--accent);
            letter-spacing:4px;margin-bottom:6px;}
        .logo p{font-size:12px;color:var(--muted);font-family:var(--mono);letter-spacing:1px;}

        .menu{width:100%;max-width:360px;display:flex;flex-direction:column;gap:12px;}

        .menu-btn{display:flex;align-items:center;gap:16px;
            padding:18px 20px;border-radius:14px;border:1.5px solid var(--border);
            background:var(--card);text-decoration:none;transition:all .25s;}
        .menu-btn:hover{transform:translateY(-2px);}
        .menu-btn.scanner  {border-color:rgba(0,229,160,.4);}
        .menu-btn.scanner:hover {background:rgba(0,229,160,.08);border-color:var(--accent);}
        .menu-btn.search   {border-color:rgba(88,166,255,.4);}
        .menu-btn.search:hover  {background:rgba(88,166,255,.08);border-color:var(--blue);}
        .menu-btn.generator{border-color:rgba(240,180,41,.4);}
        .menu-btn.generator:hover{background:rgba(240,180,41,.08);border-color:var(--warn);}

        .menu-icon{font-size:32px;width:48px;text-align:center;flex-shrink:0;}
        .menu-title{font-family:var(--mono);font-size:13px;letter-spacing:2px;
            text-transform:uppercase;margin-bottom:4px;}
        .menu-btn.scanner   .menu-title{color:var(--accent);}
        .menu-btn.search    .menu-title{color:var(--blue);}
        .menu-btn.generator .menu-title{color:var(--warn);}
        .menu-desc{font-size:12px;color:var(--muted);line-height:1.5;}

        .version{margin-top:32px;font-family:var(--mono);font-size:10px;
            color:var(--muted);opacity:.5;letter-spacing:1px;}
    </style>
</head>
<body>

<div class="logo">
    <div class="logo-dot"></div>
    <h1>PART SCANNER</h1>
    <p>Manufacturing QR System</p>
</div>

<div class="menu">
    <a class="menu-btn scanner" href="scanner.html">
        <div class="menu-icon">📷</div>
        <div>
            <div class="menu-title">Scanner</div>
            <div class="menu-desc">Scan QR Kereta, Dies, dan Lot. Simpan data ke Google Sheet.</div>
        </div>
    </a>
    <a class="menu-btn search" href="search.html">
        <div class="menu-icon">🔍</div>
        <div>
            <div class="menu-title">Search</div>
            <div class="menu-desc">Cari part by nomor kereta, atau cari kereta by Dies & Lot.</div>
        </div>
    </a>
    <a class="menu-btn generator" href="generator.html">
        <div class="menu-icon">⚙️</div>
        <div>
            <div class="menu-title">Generator</div>
            <div class="menu-desc">Buat dan cetak stiker QR untuk Dies dan Lot.</div>
        </div>
    </a>
</div>

<div class="version">v1.0 — PT Astra Honda Motor</div>

</body>
</html>
